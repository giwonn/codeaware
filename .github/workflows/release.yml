name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            bun_compile_target: bun-darwin-arm64
          - os: macos-latest
            target: darwin-x64
            bun_compile_target: bun-darwin-x64
          - os: ubuntu-latest
            target: linux-x64
            bun_compile_target: bun-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            bun_compile_target: bun-linux-aarch64
          - os: windows-latest
            target: windows-x64
            bun_compile_target: bun-windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build binary
        run: bun build src/index.ts --compile --target=${{ matrix.bun_compile_target }} --outfile codeaware-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeaware-${{ matrix.target }}
          path: codeaware-${{ matrix.target }}*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            for file in "$dir"*; do
              cp "$file" release/
            done
          done
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
